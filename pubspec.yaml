name: core_app
description: CORE – Philosophical Diagnostics

publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Networking & Storage ───────────────────────────────────────────────────
  http:                ^1.6.0
  shared_preferences:  ^2.5.5
  hive:                ^2.2.3
  hive_flutter:        ^1.1.0
  uuid:                ^4.5.1

  # ── State management ──────────────────────────────────────────────────────
  provider:            ^6.1.5+1

  # ── Firebase (Auth + Database) ────────────────────────────────────────────
  firebase_core:       ^3.13.1
  firebase_auth:       ^5.5.3
  google_sign_in:      ^6.2.2
  cloud_firestore:     ^5.6.6

  # ── Payments ──────────────────────────────────────────────────────────────
  purchases_flutter:   ^8.0.0

  # ── UI & Animations ───────────────────────────────────────────────────────
  flutter_animate:     ^4.5.2
  lottie:              ^3.3.1
  shimmer:             ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0
  flutter_lints:         ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Outfit-Black.ttf
          weight: 900
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
